name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          python -m py_compile apply_network_patch.py
          python -m py_compile apply_tab_redirection.py
          python -m py_compile global_redirect.py
          python -m py_compile patch_main.py

      - name: Bash syntax check
        run: |
          bash -n patch.sh
          bash -n cleanup.sh

      - name: Verify critical patch files exist
        run: |
          test -f patches/IRetardConfig.smali
          test -f patches/IRetardHooks.smali

      - name: Reject mojibake artifacts
        run: |
          if grep -R --line-number -E \
            --include='*.md' \
            --include='*.py' \
            --include='*.sh' \
            --include='*.smali' \
            --include='*.html' \
            --include='*.yml' \
            --include='*.yaml' \
            --exclude='ci.yml' \
            'â€”|âœ“|âŒ|â€¢|â€œ|â€|â™¥' .; then
            echo "Found mojibake artifacts in text files."
            exit 1
          fi
