name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          python -m py_compile apply_network_patch.py
          python -m py_compile apply_tab_redirection.py
          python -m py_compile global_redirect.py
          python -m py_compile patch_main.py

      - name: Bash syntax check
        run: |
          bash -n patch.sh
          bash -n cleanup.sh

      - name: Verify critical patch files exist
        run: |
          test -f patches/IRetardConfig.smali
          test -f patches/IRetardHooks.smali

      - name: Reject mojibake artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          text_suffixes = {
            ".md", ".py", ".sh", ".smali", ".html", ".yml", ".yaml", ".txt"
          }
          bad_patterns = [
            "\u00e2\u20ac\u201d",  # common mojibake for em dash
            "\u00e2\u0153\u201c",  # common mojibake for check mark
            "\u00e2\u20ac\u00a2",  # common mojibake bullet prefix
            "\u00e2\u20ac\u0153",  # smart quote mojibake
            "\u00e2\u20ac\u009d",  # smart quote mojibake
          ]

          failed = False
          for path in Path(".").rglob("*"):
            if not path.is_file() or path.suffix.lower() not in text_suffixes:
              continue
            if path.as_posix().endswith(".github/workflows/ci.yml"):
              continue
            try:
              content = path.read_text(encoding="utf-8")
            except UnicodeDecodeError:
              continue
            for marker in bad_patterns:
              if marker in content:
                print(f"Mojibake marker found in {path}: {marker}")
                failed = True

          if failed:
            raise SystemExit(1)
          PY
