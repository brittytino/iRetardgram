name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate APK input
        run: |
          test -f apk/instagram.apk

      - name: Generate checksum
        run: |
          sha256sum apk/instagram.apk > apk/instagram.apk.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apk/instagram.apk
            apk/instagram.apk.sha256
