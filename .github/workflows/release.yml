name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y apktool openjdk-17-jdk
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "build-tools;34.0.0"

      - name: Download latest Instagram APK with fallbacks
        run: |
          python3 scripts/download_instagram_apk.py --output "$RUNNER_TEMP/instagram_latest.apk"

      - name: Generate temporary signing key
        run: |
          KEYSTORE_PATH="${{ runner.temp }}/iretardgram.keystore"
          keytool -genkeypair -v \
            -keystore "$KEYSTORE_PATH" \
            -alias iretardgram \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=iRetardgram, OU=iRetardgram, O=iRetardgram, L=Unknown, ST=Unknown, C=XX"

      - name: Build patched APK variants
        env:
          IRETARDGRAM_KEYSTORE: ${{ runner.temp }}/iretardgram.keystore
          IRETARDGRAM_KEYSTORE_PASS: android
          IRETARDGRAM_KEY_ALIAS: iretardgram
          IRETARDGRAM_KEY_PASS: android
        run: |
          chmod +x patch.sh cleanup.sh
          ./patch.sh "$RUNNER_TEMP/instagram_latest.apk"
          ./patch.sh --block-stories "$RUNNER_TEMP/instagram_latest.apk"

      - name: Prepare optional release assets
        run: |
          mkdir -p release_assets

          cp artifacts/*.apk release_assets/

          for apk in release_assets/*.apk; do
            [ -f "$apk" ] || continue
            sha256sum "$apk" > "$apk.sha256"
          done

          if ! compgen -G "release_assets/*.apk" > /dev/null; then
            echo "No APK outputs were generated."
            exit 1
          fi

          ls -la release_assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: iRetardgram ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release_assets/*
