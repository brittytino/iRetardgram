name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare optional release assets
        run: |
          mkdir -p release_assets

          if compgen -G "apk/*.apk" > /dev/null; then
            cp apk/*.apk release_assets/
          fi

          if [ -f release_assets/instagram.apk ]; then
            sha256sum release_assets/instagram.apk > release_assets/instagram.apk.sha256
          fi

          ls -la release_assets || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release_assets/*
